<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewire File Opener</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Heebo', system-ui, sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .logo {
            display: inline-flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 24px;
        }
        .logo-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .dot-red    { background: #EE6E5C; }
        .dot-yellow { background: #F5C518; }
        .dot-green  { background: #2DCE89; }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .path {
            background: #f5f6f8;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #4b5563;
            margin: 16px 0;
            word-break: break-all;
            direction: ltr;
            text-align: left;
        }
        .status {
            font-size: 15px;
            color: #6b7280;
            margin: 20px 0;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.15s;
        }
        .btn:hover { background: #374151; }
        .btn-secondary {
            background: white;
            color: #1a1a1a;
            border: 1px solid #e5e7eb;
            margin-right: 8px;
        }
        .btn-secondary:hover { background: #f5f6f8; }
        .error {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 14px;
        }
        .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-dot dot-red"></div>
            <div class="logo-dot dot-yellow"></div>
            <div class="logo-dot dot-green"></div>
        </div>

        <h1 id="title">פותח קובץ...</h1>

        <div class="path" id="path-display">—</div>

        <div class="status" id="status">
            אם השרת לא נפתח אוטומטית, לחץ על הכפתור למטה
        </div>

        <button class="btn" id="open-btn" onclick="openFile()">פתח קובץ</button>
        <button class="btn btn-secondary" id="folder-btn" onclick="openFolder()">פתח תיקייה</button>

        <div class="error" id="error" style="display:none;"></div>

        <div class="hint">
            דורש התקנה חד-פעמית של Rewire File Opener על המחשב.<br>
            אם לא מותקן - פנה למחלקת IT.
        </div>
    </div>

    <script>
        // ----------------------------------------------------------
        // Parse URL parameters
        //   Expected URL formats:
        //     https://yourhost/?path=AcmeCorp/Quotes/Q-1234.pdf
        //     https://yourhost/?path=AcmeCorp/Quotes/Q-1234.pdf&action=open
        //     https://yourhost/?path=AcmeCorp&action=folder
        // ----------------------------------------------------------
        const params = new URLSearchParams(window.location.search);
        let path = params.get('path') || '';
        const action = (params.get('action') || 'open').toLowerCase();

        // Strip surrounding quotes (from Windows "Copy as path" which wraps paths in quotes)
        path = path.trim();
        if ((path.startsWith('"') && path.endsWith('"')) ||
            (path.startsWith("'") && path.endsWith("'"))) {
            path = path.slice(1, -1);
        }
        // Also strip any stray quotes that survived URL encoding
        path = path.replace(/^["']+|["']+$/g, '');

        // Display path
        document.getElementById('path-display').textContent = path || '(no path)';

        // Hide irrelevant button based on action
        if (action === 'folder') {
            document.getElementById('open-btn').style.display = 'none';
            document.getElementById('folder-btn').textContent = 'פתח תיקייה';
            document.getElementById('title').textContent = 'פותח תיקייה...';
        }

        // Validation - only block empty path and path traversal.
        // Absolute paths are allowed here; the PowerShell handler validates
        // them against BaseFolder.
        if (!path) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'שגיאה: לא צוין נתיב קובץ (?path=...)';
            document.getElementById('open-btn').style.display = 'none';
            document.getElementById('folder-btn').style.display = 'none';
        } else if (path.includes('..')) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'שגיאה: נתיב לא חוקי';
            document.getElementById('open-btn').style.display = 'none';
            document.getElementById('folder-btn').style.display = 'none';
        } else {
            // Auto-trigger the appropriate action
            setTimeout(() => {
                if (action === 'folder') {
                    openFolder();
                } else {
                    openFile();
                }
            }, 300);
        }

        // ----------------------------------------------------------
        // Build rwfile:// URI with proper UTF-8 encoding.
        // Hebrew/Arabic characters and spaces are encoded to %XX
        // so Windows passes them intact to the PowerShell handler,
        // which then decodes them back to UTF-8.
        // ----------------------------------------------------------
        function buildUri(actionName, rawPath) {
            // Split by separator to preserve "/" as path delimiter,
            // encode each segment individually.
            // Replace backslashes (if user pasted Windows path) with forward slashes first.
            const normalized = rawPath.replace(/\\/g, '/');
            const segments = normalized.split('/').map(s => encodeURIComponent(s));
            const encodedPath = segments.join('/');
            return 'rwfile://' + actionName + '?path=' + encodedPath;
        }

        function openFile() {
            window.location.href = buildUri('open', path);
            document.getElementById('status').textContent = 'הקובץ אמור להיפתח כעת. אם הופיע דיאלוג בדפדפן - אשר אותו.';
        }

        function openFolder() {
            window.location.href = buildUri('folder', path);
            document.getElementById('status').textContent = 'התיקייה אמורה להיפתח ב-Explorer. אם הופיע דיאלוג בדפדפן - אשר אותו.';
        }
    </script>
</body>
</html>
